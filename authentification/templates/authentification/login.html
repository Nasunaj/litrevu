<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - LITRevu</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'authentification/styles.css' %}">
</head>
<body>
<div class="container">
    <div class="header">Page d'accueil</div>
    <div class="logo-container">
        <div class="logo">LITRevu</div>
    </div>
    <div class="content">
        <div class="left-section">
            <div class="sign-up-title">Pas encore de compte ?</div>
            <a href="{% url 'signup' %}" class="sign-up-btn">S'inscrire</a>
        </div>
        <div class="right-section">
            <div class="login-title">Connectez-vous</div>
            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <p>{{ message }}</p>
                {% endfor %}
            </div>
            {% endif %}
            <form method="post" class="login-form">
                {% csrf_token %}
                <input type="text" name="username" class="input-field" placeholder="Nom d'utilisateur" required>
                <input type="password" name="password" class="input-field" placeholder="Mot de passe" required>
                <input type="hidden" name="next" value="{{ next }}"> <!-- marche sans mais mis quand même -->
                <button type="submit" class="login-btn">Se connecter</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
