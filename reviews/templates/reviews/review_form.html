<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ action }} une critique - LITRevu</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'authentification/styles.css' %}">
</head>
<body>
    <div id="container">
        <div id="header">{{ action }} une critique</div>
        <div class="logo-container">
            <div class="logo">LITRevu</div>
        </div>
        <div class="content">
            <div class="right-session">
                {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                    <p>{{ message }}</p>
                    {% endfor %}
                </div>
                {% endif %}
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <!--{{ form.as_p}}-->
                    <p>
                        <label for="{{ form.ticket.id_for_label }}">Ticket :</label>
                        {{ form.ticket }}
                    </p>
                    <p>
                        <label for="{{ form.rating.id_for_label }}">Note (1-5) :</label>
                        <select name="rating" id="{{ form.rating.id_for_label }}" required>
                            <option value="">--- Sélectionnez une note ---</option>
                            <option value="1">★</option>
                            <option value="2">★★</option>
                            <option value="3">★★★</option>
                            <option value="4">★★★★</option>
                            <option value="5">★★★★★</option>
                        </select>
                    </p>
                    <p>
                        <label for="{{ form.headline.id_for_label }}">Titre :</label>
                        {{ form.headline }}
                    </p>
                    <p>
                        <label for="{{ form.body.id_for_label }}">Commentaire :</label>
                        {{ form.body }}
                    </p>
                    <button type="submit" class="login-btn">{{ action }}</button>
                    <a href="{% url 'review_list' %}" class="sign-up-btn">Annuler</a>
                </form>
            </div>
        </div>
        <a href = "{% url 'logout' %}">Se déconnecter</a>
    </div>
</body>
</html>
