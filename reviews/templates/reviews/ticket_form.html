<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ action }} un billet - LITRevu</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'authentification/styles.css' %}">
</head>
<body>
    <div id="container">
        <div id="header">{{ action }} un billet</div>
        <div class="logo-container">
            <div class="logo">LITRevu</div>
        </div>
        <div class="content">
            <div class="right-session">
                {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                    <p>{{ message }}</p>
                    {% endfor %}
                </div>
                {% endif %}
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p}}
                    <button type="submit" class="login-btn">{{ action }}</button>
                    <a href="{% url 'ticket_list' %}" class="sign-up-btn">Annuler</a>
                </form>
            </div>
        </div>
        <a href = "{% url 'logout' %}">Se déconnecter</a>
    </div>
</body>
</html>
